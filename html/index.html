<!doctype html>
<!-- Purpose: authenticated entry page for the SkyShield workspace. Operators land here before reaching the protected control page. -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SkyShield Control - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Custom Theme -->
  <link href="../css/style.css" rel="stylesheet" />
</head>
<body class="login-page d-flex flex-column min-vh-100">

  <!-- The login page uses the same hero and card language as the rest of the workspace. -->
  <main class="container page-stack flex-grow-1 d-flex align-items-center py-5">
    <div class="login-shell">
      <section class="card card-hud page-hero mb-4">
        <div class="row g-4 align-items-end">
          <div class="col-lg-7">
            <div class="page-copy">
              <div class="hero-kicker">Protected Access</div>
              <h1 class="display-6 fw-semibold text-hud mb-1">SkyShield Control</h1>
              <p class="text-muted mb-0">Sign in to open the live dashboard.</p>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="chip-row justify-content-lg-end">
              <span class="support-chip">Protected access</span>
              <span class="support-chip">Direct browser</span>
              <span class="support-chip">AeroYOLO</span>
            </div>
          </div>
        </div>
      </section>

      <!-- Credential form for the protected control workflow. -->
      <div class="card card-hud shadow-lg login-panel">
        <div class="card-body p-4">
          <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
          <form id="loginForm" action="#" method="post" autocomplete="off" novalidate>
            <div class="mb-3">
              <label class="form-label" for="emailInput">Authorized Email</label>
              <input
                id="emailInput"
                type="email"
                class="form-control form-control-hud"
                placeholder="commander@skyshield.local"
                name="email"
                autocomplete="email"
                required />
              <div class="form-text text-muted">Use the briefing email assigned to your station.</div>
            </div>
            <div class="mb-4">
              <label class="form-label" for="passwordInput">Password</label>
              <input
                id="passwordInput"
                type="password"
                class="form-control form-control-hud"
                placeholder="Enter password"
                name="password"
                autocomplete="current-password"
                required />
            </div>
            <button id="loginSubmitBtn" type="submit" class="btn btn-success w-100 hud-glow">
              <i class="bi bi-shield-lock me-2"></i>Authenticate
            </button>
          </form>
        </div>
        <div class="card-footer small text-center text-muted">
          Need help? Open the <a href="manual.html" class="link-hud">Operator Manual</a>.
        </div>
      </div>
    </div>
  </main>

  <!-- Footer text keeps the same small-link rhythm used by the other pages, even on login. -->
  <footer class="text-center text-muted small py-3 footer-links">
    &copy; SkyShield 2025 - Ground Defense Command Unit
  </footer>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/pages/login.js"></script>
</body>
</html>
